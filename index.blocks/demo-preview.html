<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Section: Demo Preview</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="demo-preview.css" />
</head>
<body style="background:var(--off);padding-top:0;">

<!-- ══ SECTION 4: DEMO ══════════════════════════════════════════ -->
<section id="demo" class="section" style="background:var(--off);padding-bottom:80px;">
  <div class="wrap">

    <div class="eyebrow fi">Демо</div>
    <h2 class="fi d1">Ось як це може виглядати<br></h2>
    <p class="lead fi d2" style="margin-bottom:48px;">
      Без реальних даних — але щоб зрозуміти рівень деталізації та можливості.
      Клікніть щоб відкрити у повному розмірі.
    </p>

    <!-- Preview window -->
    <div class="dp-preview-wrap fi d3" onclick="window.open('dashboard-demo.html','_blank')">

      <!-- fake browser chrome -->
      <div class="dp-chrome">
        <div class="dp-chrome-dots">
          <span></span><span></span><span></span>
        </div>
        <div class="dp-chrome-url">Fleet Dashboard — Profit Architect Demo</div>
      </div>

      <!-- iframe scaled down -->
      <iframe src="dashboard-demo.html" scrolling="no" tabindex="-1" aria-hidden="true"></iframe>

      <!-- hover overlay -->
      <div class="dp-overlay">
        <a class="dp-open-btn" href="dashboard-demo.html" target="_blank" onclick="event.stopPropagation()">
          ↗ Відкрити на повний екран
        </a>
      </div>

    </div>

  </div>
</section>

<script>
(function() {
  var els = document.querySelectorAll('.fi');
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('on'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.12 });
  els.forEach(function(el) { obs.observe(el); });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Dashboard — Profit Architect Demo</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.2/dist/apexcharts.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#1a2f5e; --navy-dk:#111f42; --navy-lt:#243570;
  --gold:#f5b731; --green:#10b981; --blue:#3b82f6;
  --amber:#f59e0b; --red:#ef4444; --bg:#f0f3fa;
  --card:#ffffff; --text:#1c2640; --muted:#6b7a9a;
  --border:#e2e8f4; --sidebar:220px;
}
body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }

/* ── Sidebar ── */
.sidebar { width:var(--sidebar); min-height:100vh; background:var(--navy-dk); display:flex; flex-direction:column; position:fixed; top:0; left:0; z-index:100; }
.sidebar-logo { padding:24px 20px 18px; border-bottom:1px solid rgba(255,255,255,.08); }
.logo-name { color:#fff; font-size:.95rem; font-weight:700; letter-spacing:.02em; }
.logo-sub  { color:var(--gold); font-size:.72rem; font-weight:500; letter-spacing:.06em; text-transform:uppercase; margin-top:2px; }
.sidebar-nav { padding:14px 0; flex:1; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 20px; color:rgba(255,255,255,.5); font-size:.87rem; cursor:pointer; transition:all .15s; border-left:3px solid transparent; user-select:none; }
.nav-item:hover { color:rgba(255,255,255,.9); background:rgba(255,255,255,.06); }
.nav-item.active { color:#fff; background:rgba(245,183,49,.12); border-left-color:var(--gold); font-weight:600; }
.nav-icon { font-size:.95rem; width:18px; text-align:center; }
.sidebar-footer { padding:14px 20px; border-top:1px solid rgba(255,255,255,.08); color:rgba(255,255,255,.3); font-size:.72rem; }

/* ── Main ── */
.main { margin-left:var(--sidebar); flex:1; display:flex; flex-direction:column; }

/* ── Topbar ── */
.topbar { background:var(--card); border-bottom:1px solid var(--border); padding:0 28px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.topbar-title { font-size:1.05rem; font-weight:700; color:var(--navy); }
.topbar-date  { font-size:.77rem; color:var(--muted); }
.topbar-right { display:flex; align-items:center; gap:12px; }
.filter-group { display:flex; gap:3px; background:var(--bg); border-radius:8px; padding:3px; }
.filter-btn { padding:5px 14px; border:none; background:transparent; border-radius:6px; font-size:.8rem; color:var(--muted); cursor:pointer; transition:all .15s; font-family:inherit; }
.filter-btn.active { background:var(--card); color:var(--navy); font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.1); }
.filter-btn:hover:not(.active) { color:var(--navy); }
.alert-bell { position:relative; width:36px; height:36px; border-radius:50%; background:rgba(239,68,68,.1); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--red); font-size:1rem; transition:background .15s; }
.alert-bell:hover { background:rgba(239,68,68,.2); }
.alert-bell .badge { position:absolute; top:-2px; right:-2px; background:var(--red); color:#fff; font-size:.65rem; font-weight:700; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; }

/* ── Page content ── */
.content { padding:24px 28px; }

/* ── Page header ── */
.page-header { margin-bottom:20px; }
.page-header h2 { font-size:1.25rem; font-weight:800; color:var(--navy); }
.page-header p  { font-size:.82rem; color:var(--muted); margin-top:3px; }

/* ── KPI Row ── */
.kpi-row { display:grid; gap:14px; margin-bottom:20px; }
.kpi-6 { grid-template-columns:repeat(6,1fr); }
.kpi-4 { grid-template-columns:repeat(4,1fr); }
.kpi-3 { grid-template-columns:repeat(3,1fr); }
.kpi-card { background:var(--card); border-radius:12px; padding:18px 16px; box-shadow:0 1px 4px rgba(26,47,94,.07); transition:transform .2s,box-shadow .2s; cursor:default; border-top:3px solid transparent; }
.kpi-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(26,47,94,.12); }
.kpi-card.c-green { border-top-color:var(--green); }
.kpi-card.c-blue  { border-top-color:var(--blue); }
.kpi-card.c-gold  { border-top-color:var(--gold); }
.kpi-card.c-red   { border-top-color:var(--red); }
.kpi-card.c-amber { border-top-color:var(--amber); }
.kpi-label { font-size:.72rem; color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
.kpi-value { font-size:1.6rem; font-weight:800; color:var(--navy); line-height:1; }
.kpi-sub   { font-size:.75rem; color:var(--muted); margin-top:3px; }
.kpi-delta { display:flex; align-items:center; gap:4px; margin-top:8px; font-size:.79rem; font-weight:600; }
.kpi-delta.up   { color:var(--green); }
.kpi-delta.down { color:var(--red); }
.kpi-delta.warn { color:var(--red); }
.kpi-delta.neu  { color:var(--muted); }

/* ── Charts ── */
.charts-row { display:grid; gap:14px; margin-bottom:14px; }
.row-6-4 { grid-template-columns:3fr 2fr; }
.row-5-5 { grid-template-columns:1fr 1fr; }
.row-1   { grid-template-columns:1fr; }
.chart-card { background:var(--card); border-radius:12px; padding:20px; box-shadow:0 1px 4px rgba(26,47,94,.07); }
.chart-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
.chart-title  { font-size:.92rem; font-weight:700; color:var(--navy); }
.chart-sub    { font-size:.75rem; color:var(--muted); margin-top:2px; }
.chart-badge  { font-size:.7rem; padding:3px 8px; border-radius:20px; font-weight:600; background:rgba(16,185,129,.1); color:var(--green); white-space:nowrap; }

/* ── Alerts ── */
.alerts-list { display:flex; flex-direction:column; gap:10px; margin-top:12px; }
.alert-item { display:flex; align-items:center; gap:14px; padding:12px 14px; border-radius:8px; font-size:.85rem; }
.alert-item.crit { background:rgba(239,68,68,.07); border:1px solid rgba(239,68,68,.2); }
.alert-item.warn { background:rgba(245,158,11,.07); border:1px solid rgba(245,158,11,.2); }
.alert-item.info { background:rgba(59,130,246,.07); border:1px solid rgba(59,130,246,.2); }
.alert-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.alert-item.crit .alert-dot { background:var(--red); box-shadow:0 0 6px rgba(239,68,68,.5); }
.alert-item.warn .alert-dot { background:var(--amber); }
.alert-item.info .alert-dot { background:var(--blue); }
.alert-text  { flex:1; color:var(--text); }
.alert-text strong { color:var(--navy); }
.alert-time  { font-size:.75rem; color:var(--muted); white-space:nowrap; }
.alert-action { padding:5px 12px; border-radius:6px; border:none; font-size:.78rem; font-family:inherit; cursor:pointer; font-weight:600; white-space:nowrap; transition:opacity .15s; }
.alert-action:hover { opacity:.75; }
.alert-item.crit .alert-action { background:rgba(239,68,68,.12); color:var(--red); }
.alert-item.warn .alert-action { background:rgba(245,158,11,.12); color:var(--amber); }
.alert-item.info .alert-action { background:rgba(59,130,246,.12); color:var(--blue); }

/* ── Data Table ── */
.table-wrap { overflow-x:auto; margin-top:14px; }
.search-row { display:flex; gap:10px; margin-bottom:12px; align-items:center; }
.search-input { flex:1; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:.85rem; color:var(--text); outline:none; }
.search-input:focus { border-color:var(--navy); }
.data-table { width:100%; border-collapse:collapse; font-size:.85rem; }
.data-table th { background:var(--navy); color:#fff; padding:10px 14px; text-align:left; font-size:.75rem; font-weight:600; letter-spacing:.04em; text-transform:uppercase; }
.data-table th:first-child { border-radius:8px 0 0 0; }
.data-table th:last-child  { border-radius:0 8px 0 0; }
.data-table td { padding:11px 14px; border-bottom:1px solid var(--border); color:var(--text); }
.data-table tr:hover td { background:rgba(26,47,94,.03); cursor:pointer; }
.data-table tr:last-child td { border-bottom:none; }
.rank-num { font-weight:700; color:var(--muted); }

/* ── Badges ── */
.tier-badge, .status-badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:.72rem; font-weight:700; }
.tier-top   { background:rgba(16,185,129,.12); color:#059669; }
.tier-good  { background:rgba(59,130,246,.12); color:#2563eb; }
.tier-avg   { background:rgba(245,158,11,.12); color:#d97706; }
.tier-low   { background:rgba(239,68,68,.12); color:#dc2626; }
.st-active  { background:rgba(16,185,129,.12); color:#059669; }
.st-idle    { background:rgba(245,158,11,.12); color:#d97706; }
.st-maint   { background:rgba(239,68,68,.12); color:#dc2626; }

/* ── Fleet Grid ── */
.fleet-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
.fleet-stat { background:var(--card); border-radius:10px; padding:16px; text-align:center; box-shadow:0 1px 4px rgba(26,47,94,.07); }
.fleet-stat-num { font-size:2rem; font-weight:800; color:var(--navy); line-height:1; }
.fleet-stat-label { font-size:.77rem; color:var(--muted); margin-top:4px; }
.truck-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
.truck-card { background:var(--card); border-radius:10px; padding:14px 16px; box-shadow:0 1px 3px rgba(26,47,94,.07); border-left:4px solid var(--border); transition:transform .15s; }
.truck-card:hover { transform:translateY(-2px); }
.truck-card.active { border-left-color:var(--green); }
.truck-card.idle   { border-left-color:var(--amber); }
.truck-card.maintenance { border-left-color:var(--red); }
.truck-id     { font-size:.8rem; font-weight:700; color:var(--muted); margin-bottom:4px; }
.truck-driver { font-size:.9rem; font-weight:700; color:var(--navy); }
.truck-loc    { font-size:.77rem; color:var(--muted); margin-top:3px; }
.truck-footer { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
.truck-updated { font-size:.72rem; color:var(--muted); }

/* ── Dispatcher Cards ── */
.dispatcher-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px; }
.disp-card { background:var(--card); border-radius:12px; padding:20px; box-shadow:0 1px 4px rgba(26,47,94,.07); border-top:4px solid var(--blue); }
.disp-card:nth-child(1) { border-top-color:var(--green); }
.disp-card:nth-child(2) { border-top-color:var(--blue); }
.disp-card:nth-child(3) { border-top-color:var(--amber); }
.disp-name   { font-size:1rem; font-weight:700; color:var(--navy); margin-bottom:14px; }
.disp-stats  { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.disp-stat   { }
.disp-stat-label { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
.disp-stat-value { font-size:1.1rem; font-weight:700; color:var(--navy); margin-top:2px; }

/* ── Reports ── */
.report-list { display:flex; flex-direction:column; gap:10px; margin-top:8px; }
.report-item { background:var(--card); border-radius:10px; padding:16px 20px; box-shadow:0 1px 3px rgba(26,47,94,.07); display:flex; align-items:center; gap:16px; }
.report-icon { font-size:1.5rem; }
.report-info { flex:1; }
.report-name { font-weight:700; color:var(--navy); font-size:.92rem; }
.report-desc { font-size:.78rem; color:var(--muted); margin-top:2px; }
.report-badge { font-size:.72rem; padding:3px 9px; border-radius:20px; font-weight:600; }
.rb-ready { background:rgba(16,185,129,.12); color:#059669; }
.rb-gen   { background:rgba(245,158,11,.12); color:#d97706; }
.report-btn { padding:7px 16px; border-radius:8px; border:none; font-family:inherit; font-size:.82rem; cursor:pointer; font-weight:600; background:var(--navy); color:#fff; transition:opacity .15s; }
.report-btn:hover { opacity:.85; }
.report-btn.sec { background:var(--bg); color:var(--navy); }

/* ── Settings ── */
.settings-body { display:flex; flex-direction:column; gap:20px; }
.settings-section { background:var(--card); border-radius:12px; padding:22px; box-shadow:0 1px 4px rgba(26,47,94,.07); }
.settings-section h3 { font-size:.9rem; font-weight:700; color:var(--navy); margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label { font-size:.77rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
.form-input, .form-select { padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:.88rem; color:var(--text); outline:none; background:var(--bg); }
.form-input:focus, .form-select:focus { border-color:var(--navy); background:#fff; }
.toggle-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.toggle-row:last-child { border-bottom:none; }
.toggle-label { font-size:.88rem; color:var(--text); }
.toggle-sub   { font-size:.75rem; color:var(--muted); }
.toggle { position:relative; width:40px; height:22px; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:#cbd5e1; border-radius:11px; cursor:pointer; transition:.2s; }
.toggle-slider::before { content:''; position:absolute; width:16px; height:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
.toggle input:checked + .toggle-slider { background:var(--green); }
.toggle input:checked + .toggle-slider::before { transform:translateX(18px); }
.save-btn { margin-top:16px; padding:9px 24px; background:var(--navy); color:#fff; border:none; border-radius:8px; font-family:inherit; font-size:.88rem; font-weight:600; cursor:pointer; transition:opacity .15s; }
.save-btn:hover { opacity:.85; }
.users-table { width:100%; border-collapse:collapse; font-size:.85rem; margin-top:4px; }
.users-table th { text-align:left; font-size:.72rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; padding:8px 0; border-bottom:1px solid var(--border); }
.users-table td { padding:10px 0; border-bottom:1px solid var(--border); }
.users-table tr:last-child td { border-bottom:none; }
.role-badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:.72rem; font-weight:600; background:rgba(26,47,94,.08); color:var(--navy); }

/* ── Overlay ── */
.overlay { position:fixed; inset:0; background:rgba(17,31,66,.45); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
.overlay.show { opacity:1; pointer-events:all; }
.overlay-card { background:var(--card); border-radius:16px; padding:28px; width:460px; box-shadow:0 24px 60px rgba(17,31,66,.25); transform:translateY(20px); transition:transform .25s; }
.overlay.show .overlay-card { transform:translateY(0); }
.overlay-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.overlay-title { font-size:1.1rem; font-weight:700; color:var(--navy); }
.overlay-close { background:none; border:none; font-size:1.3rem; color:var(--muted); cursor:pointer; line-height:1; }
.overlay-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
.overlay-stat { background:var(--bg); border-radius:8px; padding:12px; }
.overlay-stat-label { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
.overlay-stat-value { font-size:1.2rem; font-weight:700; color:var(--navy); margin-top:4px; }
.overlay-lanes-label { font-size:.72rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
.overlay-lanes span { display:inline-block; background:rgba(26,47,94,.07); border-radius:4px; padding:3px 8px; margin:3px 3px 0 0; color:var(--navy); font-weight:600; font-size:.82rem; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-name">⬡ Profit Architect</div>
    <div class="logo-sub">Fleet Dashboard</div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav">
    <div class="nav-item active" data-page="dashboard"><span class="nav-icon">▦</span> Dashboard</div>
    <div class="nav-item" data-page="drivers"><span class="nav-icon">🚛</span> Водії</div>
    <div class="nav-item" data-page="dispatchers"><span class="nav-icon">📋</span> Диспетчери</div>
    <div class="nav-item" data-page="lanes"><span class="nav-icon">🗺</span> Лейни</div>
    <div class="nav-item" data-page="fleet"><span class="nav-icon">🔧</span> Флот</div>
    <div class="nav-item" data-page="reports"><span class="nav-icon">📊</span> Звіти</div>
    <div class="nav-item" data-page="settings"><span class="nav-icon">⚙</span> Налаштування</div>
  </nav>
  <div class="sidebar-footer">Demo · Profit Architect © 2025</div>
</aside>

<main class="main">
  <header class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Огляд компанії</div>
    </div>
    <div class="topbar-right">
      <div class="filter-group" id="filter-group">
        <button class="filter-btn" data-period="week">Тиждень</button>
        <button class="filter-btn active" data-period="month">Місяць</button>
        <button class="filter-btn" data-period="quarter">Квартал</button>
      </div>
      <div class="alert-bell" id="alert-bell">🔔<span class="badge">3</span></div>
    </div>
  </header>
  <div id="page-content"></div>
</main>

<div class="overlay" id="overlay">
  <div class="overlay-card">
    <div class="overlay-header">
      <div class="overlay-title" id="ov-name">—</div>
      <button class="overlay-close" id="overlay-close">✕</button>
    </div>
    <div class="overlay-stats">
      <div class="overlay-stat"><div class="overlay-stat-label">Прибуток / міс</div><div class="overlay-stat-value" id="ov-profit">—</div></div>
      <div class="overlay-stat"><div class="overlay-stat-label">Рейсів</div><div class="overlay-stat-value" id="ov-loads">—</div></div>
      <div class="overlay-stat"><div class="overlay-stat-label">Паливо CPM</div><div class="overlay-stat-value" id="ov-cpm">—</div></div>
      <div class="overlay-stat"><div class="overlay-stat-label">Тир</div><div class="overlay-stat-value" id="ov-tier">—</div></div>
    </div>
    <div class="overlay-lanes-label">Основні лейни</div>
    <div class="overlay-lanes" id="ov-lanes"></div>
  </div>
</div>

// ── Helpers ───────────────────────────────────────────────────────────
function tierLabel(t) { return t==='top'?'Топ':t==='good'?'Добре':t==='avg'?'Середньо':'Нижче норми'; }
function tierCls(t)   { return 'tier-'+t; }
function tierColor(v) { return v>6500?'#10b981':v>5500?'#3b82f6':v>4500?'#f59e0b':'#ef4444'; }
function laneColor(v) { return v>=1.3?'#10b981':v>=1.1?'#3b82f6':v>=0.9?'#f59e0b':'#ef4444'; }
function fmt$(v)      { return '$'+Number(v).toLocaleString(); }

function destroyCharts() {
  Object.keys(charts).forEach(function(k) {
    try { charts[k].destroy(); } catch(e) {}
  });
  charts = {};
}

function kpiCard(label, value, sub, deltaDir, delta, cls) {
  var dCls = deltaDir==='up'?'up':deltaDir==='down'?'down':deltaDir==='warn'?'warn':'neu';
  var arrow = deltaDir==='up'?'▲':deltaDir==='down'?'▼':deltaDir==='warn'?'●':'—';
  return '<div class="kpi-card '+cls+'"><div class="kpi-label">'+label+'</div><div class="kpi-value">'+value+'</div><div class="kpi-sub">'+sub+'</div><div class="kpi-delta '+dCls+'">'+arrow+' '+delta+'</div></div>';
}

// ── Navigate ──────────────────────────────────────────────────────────
function navigate(page) {
  destroyCharts();
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.page === page);
  });
  var titles = { dashboard:'Огляд компанії', drivers:'Водії', dispatchers:'Диспетчери', lanes:'Лейни', fleet:'Флот', reports:'Звіти', settings:'Налаштування' };
  document.getElementById('topbar-title').textContent = titles[page] || page;
  var fgGroup = document.getElementById('filter-group');
  fgGroup.style.visibility = (page === 'dashboard') ? 'visible' : 'hidden';
  var renders = { dashboard:renderDashboard, drivers:renderDrivers, dispatchers:renderDispatchers, lanes:renderLanes, fleet:renderFleet, reports:renderReports, settings:renderSettings };
  if (renders[page]) renders[page]();
}

function renderDrivers() {
  var sorted = DATA.drivers.slice().sort(function(a,b){ return b.revenue-a.revenue; });
  var avgRev = Math.round(sorted.reduce(function(s,d){return s+d.revenue;},0) / sorted.length);
  var lowCount = DATA.drivers.filter(function(d){return d.tier==='low';}).length;
  var rows = sorted.map(function(d,i){
    var pctRaw = (d.revenue - avgRev) / avgRev * 100;
    var pct = (pctRaw >= 0 ? '+' : '') + pctRaw.toFixed(1) + '%';
    var pctColor = pctRaw >= 2 ? 'var(--green)' : pctRaw >= -2 ? 'var(--muted)' : 'var(--red)';
    var trend = pctRaw >= 5 ? '<span style="color:var(--green);font-weight:700;">↑</span>'
              : pctRaw >= -5 ? '<span style="color:var(--muted);">→</span>'
              : '<span style="color:var(--red);font-weight:700;">↓</span>';
    return '<tr data-driver-id="'+d.id+'" style="'+(d.tier==='low'?'background:rgba(239,68,68,.03);':'')+'">'+
      '<td class="rank-num">'+(i+1)+'</td>'+
      '<td><strong>'+d.name+'</strong></td>'+
      '<td style="color:var(--muted);font-size:.8rem;">'+d.truck+'</td>'+
      '<td style="text-align:center;">'+d.loads+'</td>'+
      '<td><strong>'+fmt$(d.revenue)+'</strong></td>'+
      '<td style="font-weight:700;color:'+pctColor+';">'+pct+'</td>'+
      '<td style="color:var(--muted);font-size:.8rem;">$'+d.cpm.toFixed(2)+'/mi</td>'+
      '<td style="text-align:center;font-size:1.1rem;">'+trend+'</td>'+
      '<td>'+d.lanes.join(', ')+'</td>'+
      '<td><span class="tier-badge '+tierCls(d.tier)+'">'+tierLabel(d.tier)+'</span></td>'+
    '</tr>';
  }).join('');

  document.getElementById('page-content').innerHTML =
    '<div class="content">'+
    '<div class="page-header"><h2>Водії</h2><p>'+DATA.drivers.length+' водіїв · середній прибуток '+fmt$(avgRev)+' / міс · клік на рядку → деталі</p></div>'+
    '<div class="kpi-row kpi-4">'+
      kpiCard('Всього водіїв', DATA.drivers.length, 'у базі', 'neu', 'квітень 2025', 'c-blue')+
      kpiCard('Серед. прибуток/водій', fmt$(avgRev), 'на місяць', 'up', '+6% vs березень', 'c-green')+
      kpiCard('Топ водій', sorted[0].name.split(' ')[0]+' '+sorted[0].name.split(' ')[1], fmt$(sorted[0].revenue)+' / міс', 'up', 'тир: топ', 'c-gold')+
      kpiCard('Нижче норми', lowCount+' водіїв', 'потребують уваги', 'warn', 'переглянути', 'c-red')+
    '</div>'+
    '<div class="chart-card">'+
    '<div class="search-row"><input class="search-input" id="driver-search" placeholder="Пошук по імені або лейну..." /><span style="font-size:.8rem;color:var(--muted);">'+DATA.drivers.length+' водіїв</span></div>'+
    '<div class="table-wrap"><table class="data-table" id="drivers-table">'+
      '<thead><tr><th>#</th><th>Ім\'я</th><th>Трак</th><th>Рейсів</th><th>Прибуток за місяць</th><th>% від серед.</th><th>CPM</th><th>Тренд</th><th>Лейни</th><th>Тир</th></tr></thead>'+
      '<tbody id="drivers-tbody">'+rows+'</tbody>'+
    '</table></div>'+
    '</div>'+
    '</div>';

  document.getElementById('driver-search').addEventListener('input', function() {
    var q = this.value.toLowerCase();
    document.querySelectorAll('#drivers-tbody tr').forEach(function(row) {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });
}

// DRIVER OVERLAY
// ══════════════════════════════════════════════════════
function openDriverOverlay(d) {
  var tier = { top:'🟢 Топ', good:'🔵 Добре', avg:'🟡 Середньо', low:'🔴 Нижче норми' };
  document.getElementById('ov-name').textContent = d.name + ' · ' + d.truck;
  document.getElementById('ov-profit').textContent = fmt$(d.revenue);
  document.getElementById('ov-loads').textContent  = d.loads + ' рейсів';
  document.getElementById('ov-cpm').textContent    = '$' + d.cpm.toFixed(2) + '/mi';
  document.getElementById('ov-tier').textContent   = tier[d.tier];
  document.getElementById('ov-lanes').innerHTML    = d.lanes.map(function(l){ return '<span>'+l+'</span>'; }).join('');
  document.getElementById('overlay').classList.add('show');
}
document.getElementById('overlay-close').addEventListener('click', function(){ document.getElementById('overlay').classList.remove('show'); });
document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) this.classList.remove('show'); });

// Row click delegation for driver table
document.getElementById('page-content').addEventListener('click', function(e) {
  var row = e.target.closest('[data-driver-id]');
  if (row) {
    var id = parseInt(row.dataset.driverId);
    var d = DATA.drivers.find(function(x){ return x.id===id; });
    if (d) openDriverOverlay(d);
  }
});

// ══════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════
document.getElementById('sidebar-nav').addEventListener('click', function(e) {
  var item = e.target.closest('.nav-item');
  if (item && item.dataset.page) navigate(item.dataset.page);
});

// ── Alert bell → scroll to alerts ────────────────────
document.getElementById('alert-bell').addEventListener('click', function() {
  if (state.page !== 'dashboard') {
    navigate('dashboard');
    setTimeout(function() {
      var el = document.getElementById('alerts-section');
      if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 700);
  } else {
    var el = document.getElementById('alerts-section');
    if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
  }
});

// ── Time filter ───────────────────────────────────────
document.getElementById('filter-group').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  var p = btn.dataset.period;
  if (!p || p === state.period) return;
  state.period = p;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.period===p); });
  if (state.page === 'dashboard') {
    var d = TIMEDATA[p];
    if (charts.revenue) {
      charts.revenue.updateOptions({ xaxis:{ categories:d.cats } });
      charts.revenue.updateSeries([ { name:'Виручка ($K)', data:d.revenue }, { name:'Прибуток ($K)', data:d.profit } ]);
    }
    // update KPI cards
    var kpiEl = document.getElementById('kpi-row');
    if (kpiEl) {
      kpiEl.innerHTML =
        kpiCard('Виручка (MTD)', d.rev_kpi, p==='week'?'поточний тиждень':p==='quarter'?'Q1 2025':'квітень 2025', 'up', d.delta_rev+' vs попередній', 'c-green')+
        kpiCard('Чистий прибуток', d.prof_kpi, 'маржа '+d.margin, 'up', d.delta_prof+' vs попередній', 'c-green')+
        kpiCard('Дохід / трак', d.rtruck, 'на активний трак', 'up', d.delta_rt+' vs попередній', 'c-gold')+
        kpiCard('Активних траків', '31 / 35', '89% утилізація', 'up', '▲ vs 82% минулий', 'c-blue')+
        kpiCard('Паливо (CPM)', '$0.68', 'ринок: $0.70', 'up', '-3% (добре)', 'c-green')+
        kpiCard('Алертів', '3', 'потребують уваги', 'warn', '1 критичний', 'c-red');
    }
  }
});
